version: '3.8'

services:
  db:
    image: postgres:15
    container_name: truthlens_postgres
    environment:
      POSTGRES_USER: truthlens_user
      POSTGRES_PASSWORD: truthlens_password
      POSTGRES_DB: truthlens
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U truthlens_user -d truthlens"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: truthlens_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5
    container_name: truthlens_neo4j
    environment:
      NEO4J_AUTH: neo4j/truthlens_password
    ports:
      - "7474:7474" # Browser endpoint
      - "7687:7687" # Bolt connection
    volumes:
      - neo4j_data:/data

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
